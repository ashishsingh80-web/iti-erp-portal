<style>
  :root {
    --bg: #f4efe6;
    --bg-soft: #fbf8f3;
    --surface: rgba(255, 255, 255, 0.78);
    --surface-strong: #fffefb;
    --surface-dark: #162218;
    --text: #1b1b18;
    --muted: #63675f;
    --line: rgba(18, 32, 22, 0.1);
    --primary: #0d8f63;
    --primary-deep: #08553b;
    --accent: #ff8f3d;
    --danger: #c75146;
    --shadow: 0 20px 60px rgba(23, 29, 24, 0.1);
    --radius-xl: 28px;
    --radius-lg: 20px;
    --radius-md: 14px;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    background:
      radial-gradient(circle at top left, rgba(255, 143, 61, 0.2), transparent 30%),
      radial-gradient(circle at right 20%, rgba(13, 143, 99, 0.18), transparent 24%),
      linear-gradient(160deg, #f5ecdf 0%, #eef5ef 55%, #edf4f2 100%);
  }

  button,
  input,
  select,
  textarea {
    font: inherit;
  }

  .app-shell {
    display: grid;
    grid-template-columns: 280px minmax(0, 1fr);
    gap: 24px;
    padding: 24px;
  }

  .sidebar,
  .panel,
  .hero,
  .table-shell,
  .status-banner,
  .table-card {
    backdrop-filter: blur(16px);
    background: var(--surface);
    border: 1px solid rgba(255, 255, 255, 0.55);
    box-shadow: var(--shadow);
  }

  .sidebar {
    position: sticky;
    top: 24px;
    height: calc(100vh - 48px);
    border-radius: var(--radius-xl);
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .brand {
    display: flex;
    gap: 14px;
    align-items: center;
  }

  .brand-mark {
    width: 56px;
    height: 56px;
    border-radius: 18px;
    display: grid;
    place-items: center;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    color: white;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    letter-spacing: 0.08em;
  }

  .brand h1,
  .hero h2,
  .panel h3,
  .section-title {
    margin: 0;
    font-family: 'Space Grotesk', sans-serif;
    letter-spacing: -0.03em;
  }

  .eyebrow {
    margin: 0 0 6px;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--muted);
  }

  .nav {
    display: grid;
    gap: 10px;
  }

  .nav-btn,
  .btn {
    border: 0;
    cursor: pointer;
    border-radius: 999px;
    transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease;
  }

  .nav-btn {
    padding: 14px 16px;
    text-align: left;
    background: rgba(22, 34, 24, 0.06);
    color: var(--text);
  }

  .nav-btn.active,
  .nav-btn:hover {
    background: linear-gradient(135deg, var(--primary-deep), var(--primary));
    color: white;
    box-shadow: 0 10px 30px rgba(8, 85, 59, 0.22);
    transform: translateY(-1px);
  }

  .sidebar-card {
    padding: 18px;
    border-radius: var(--radius-lg);
    background: linear-gradient(160deg, rgba(255,255,255,0.8), rgba(255,255,255,0.46));
    border: 1px solid var(--line);
  }

  .compact-list {
    margin: 0;
    padding-left: 18px;
    color: var(--muted);
    display: grid;
    gap: 8px;
  }

  .main {
    display: grid;
    gap: 20px;
    min-width: 0;
  }

  .hero {
    border-radius: var(--radius-xl);
    padding: 28px;
    display: flex;
    justify-content: space-between;
    gap: 24px;
    align-items: end;
    background:
      linear-gradient(120deg, rgba(8, 85, 59, 0.92), rgba(13, 143, 99, 0.84)),
      linear-gradient(45deg, rgba(255, 143, 61, 0.35), transparent);
    color: white;
  }

  .hero-copy {
    max-width: 760px;
    margin: 10px 0 0;
    color: rgba(255,255,255,0.8);
  }

  .hero-chip-row,
  .button-row,
  .table-actions,
  .summary-strip {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .chip {
    display: inline-flex;
    align-items: center;
    padding: 10px 14px;
    border-radius: 999px;
    background: rgba(255,255,255,0.14);
    border: 1px solid rgba(255,255,255,0.22);
  }

  .status-banner {
    border-radius: var(--radius-lg);
    padding: 14px 16px;
    color: var(--surface-dark);
  }

  .status-banner.success {
    background: rgba(13, 143, 99, 0.12);
  }

  .status-banner.error {
    background: rgba(199, 81, 70, 0.12);
  }

  .hidden {
    display: none;
  }

  .page {
    display: none;
    gap: 20px;
  }

  .page.active {
    display: grid;
  }

  .dashboard-grid,
  .grid-two,
  .filters-grid,
  .form-grid,
  .stat-grid {
    display: grid;
    gap: 16px;
  }

  .stat-grid {
    grid-template-columns: repeat(4, minmax(0, 1fr));
  }

  .card {
    border-radius: var(--radius-lg);
    padding: 18px;
    background: linear-gradient(180deg, rgba(255,255,255,0.88), rgba(255,255,255,0.6));
    border: 1px solid var(--line);
    min-width: 0;
  }

  .card h4 {
    margin: 0;
    color: var(--muted);
    font-size: 14px;
    font-weight: 500;
  }

  .card .value {
    margin-top: 12px;
    font-size: clamp(28px, 4vw, 42px);
    font-family: 'Space Grotesk', sans-serif;
  }

  .summary-strip .card {
    flex: 1 1 180px;
  }

  .grid-two {
    grid-template-columns: minmax(0, 1.2fr) minmax(0, 0.8fr);
  }

  .panel,
  .table-card {
    border-radius: var(--radius-xl);
    padding: 22px;
  }

  .panel-head {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    align-items: start;
    margin-bottom: 18px;
  }

  .panel-copy {
    margin: 8px 0 0;
    color: var(--muted);
  }

  .form-grid {
    grid-template-columns: repeat(12, minmax(0, 1fr));
  }

  .field {
    display: grid;
    gap: 8px;
    min-width: 0;
  }

  .field.col-3 { grid-column: span 3; }
  .field.col-4 { grid-column: span 4; }
  .field.col-6 { grid-column: span 6; }
  .field.col-12 { grid-column: span 12; }

  .field label {
    font-size: 13px;
    color: var(--muted);
  }

  .field input,
  .field select,
  .field textarea {
    width: 100%;
    border-radius: 16px;
    border: 1px solid rgba(20, 33, 23, 0.12);
    background: rgba(255,255,255,0.84);
    padding: 14px 14px;
    outline: none;
    transition: border-color 180ms ease, box-shadow 180ms ease, transform 180ms ease;
  }

  .field textarea {
    min-height: 120px;
    resize: vertical;
  }

  .field input:focus,
  .field select:focus,
  .field textarea:focus {
    border-color: rgba(13, 143, 99, 0.65);
    box-shadow: 0 0 0 4px rgba(13, 143, 99, 0.12);
  }

  .filters-grid {
    grid-template-columns: repeat(6, minmax(0, 1fr));
    align-items: end;
  }

  .btn {
    padding: 14px 18px;
    background: linear-gradient(135deg, var(--primary-deep), var(--primary));
    color: white;
    box-shadow: 0 12px 30px rgba(8, 85, 59, 0.18);
  }

  .btn.secondary {
    background: rgba(20, 33, 23, 0.08);
    color: var(--text);
    box-shadow: none;
  }

  .btn:hover {
    transform: translateY(-1px);
  }

  .btn:disabled {
    opacity: 0.65;
    cursor: wait;
    transform: none;
  }

  .table-shell {
    overflow: hidden;
    border-radius: 18px;
    border: 1px solid var(--line);
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th,
  td {
    padding: 14px 16px;
    text-align: left;
    border-bottom: 1px solid rgba(20, 33, 23, 0.08);
    vertical-align: top;
  }

  th {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    background: rgba(20, 33, 23, 0.04);
  }

  tbody tr:hover {
    background: rgba(255,255,255,0.5);
  }

  .pill {
    display: inline-flex;
    align-items: center;
    border-radius: 999px;
    padding: 8px 12px;
    background: rgba(13, 143, 99, 0.1);
    color: var(--primary-deep);
    font-size: 13px;
  }

  .link-btn {
    color: var(--primary-deep);
    text-decoration: none;
    font-weight: 700;
  }

  .muted {
    color: var(--muted);
  }

  .loading-state,
  .empty-state {
    padding: 32px 18px;
    text-align: center;
    color: var(--muted);
  }

  .skeleton {
    position: relative;
    overflow: hidden;
  }

  .skeleton::after {
    content: '';
    position: absolute;
    inset: 0;
    transform: translateX(-100%);
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.65), transparent);
    animation: shimmer 1.4s infinite;
  }

  @keyframes shimmer {
    100% {
      transform: translateX(100%);
    }
  }

  @media (max-width: 1160px) {
    .app-shell {
      grid-template-columns: 1fr;
    }

    .sidebar {
      position: static;
      height: auto;
    }

    .grid-two,
    .stat-grid,
    .filters-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
  }

  @media (max-width: 720px) {
    .app-shell {
      padding: 14px;
      gap: 14px;
    }

    .hero {
      padding: 20px;
      align-items: start;
    }

    .hero,
    .panel-head {
      flex-direction: column;
    }

    .stat-grid,
    .grid-two,
    .filters-grid,
    .form-grid {
      grid-template-columns: 1fr;
    }

    .field.col-3,
    .field.col-4,
    .field.col-6,
    .field.col-12 {
      grid-column: span 1;
    }

    th,
    td {
      padding: 12px;
    }
  }
</style>
